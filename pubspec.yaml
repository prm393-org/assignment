name: chuoi_xanh_viet
description: Chuỗi Xanh Việt — Flutter mobile (consumer, farmer, admin)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.8.0+1
  go_router: ^15.1.2
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  image_picker: ^1.1.2
  mobile_scanner: ^7.0.1
  equatable: ^2.0.7
  collection: ^1.19.1
  url_launcher: ^6.3.1
  socket_io_client: ^3.1.6
  geolocator: ^14.0.2
  google_fonts: ^8.2.0
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  google_sign_in: ^6.3.0
  firebase_analytics: ^11.6.0
  cloud_firestore: ^5.6.12
  firebase_database: ^11.3.10
  firebase_crashlytics: ^4.3.10
  firebase_messaging: ^15.2.10
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# path_provider_android 2.3.0+ pulls in `jni`, whose CMake/NDK build fails on
# Windows (`ninja: manifest 'build.ninja' still dirty after 100 tries`).
# 2.2.17 is the last release without that native dependency.
dependency_overrides:
  path_provider_android: 2.2.17

flutter:
  uses-material-design: true
